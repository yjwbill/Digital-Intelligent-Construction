<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生产-大屏看板</title>
<base href="../../../">
<link rel="stylesheet" href="./styles.css?v=2.2.274-output-completion-rate">
<link rel="stylesheet" href="./src/components/base-select/base-select.css">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="top-left">
      <div class="portal-switch" onclick="togglePcPortalDropdown(event)">
        <button class="portal-switch-trigger" type="button" aria-label="切换端口">
          <span class="portal-switch-grid">▪▪<br/>▪▪</span>
        </button>
        <div class="portal-brand">
          <div class="logo-icon" id="portalLogoIcon">企</div>
          <strong id="portalTitle">企业管理</strong>
        </div>
        <div class="portal-switch-pop" id="portalSwitchPop">
          <div class="portal-pop-brand">
            <span class="portal-pop-mark"></span>
            <strong>数智施工</strong>
          </div>
          <div class="portal-pop-divider"></div>
          <div class="portal-pop-grid">
            <button type="button" data-portal="enterprise" onclick="switchPcPortal(event,'enterprise')">
              <span class="portal-option-icon enterprise">企</span>
              <span>企业管理</span>
            </button>
            <button type="button" data-portal="project" onclick="switchPcPortal(event,'project')">
              <span class="portal-option-icon project">项</span>
              <span>项目管理</span>
            </button>
          </div>
        </div>
      </div>
      <nav class="primary-nav" id="primaryNav"></nav>
    </div>
    <div class="top-user">
      <div class="org-switch" onclick="toggleOrgDropdown(event)">
        <div class="org-current">
          <span class="org-label">组织</span>
          <span id="currentOrgName">隧道股份</span>
          <span class="org-arrow">⌄</span>
        </div>
        <div class="org-dropdown">
          <div class="org-dropdown-title">切换组织</div>
          <div class="org-option active" onclick="selectOrg(event,'隧道股份')">
            <div>
              <div class="org-name">隧道股份</div>
              <div class="org-desc">股份级 · 查看全部组织数据</div>
            </div>
            <span class="org-check">✓</span>
          </div>
          <div class="org-option" onclick="selectOrg(event,'上海隧道')">
            <div>
              <div class="org-name">上海隧道</div>
              <div class="org-desc">子公司 · 隧道股份下属组织</div>
            </div>
            <span class="org-check">✓</span>
          </div>
          <div class="org-option" onclick="selectOrg(event,'市政集团')">
            <div>
              <div class="org-name">市政集团</div>
              <div class="org-desc">子公司 · 隧道股份下属组织</div>
            </div>
            <span class="org-check">✓</span>
          </div>
        </div>
      </div>

      <div class="user-menu" onclick="toggleUserDropdown(event)">
        <div class="user-profile">
          <div class="user-avatar">王</div>
          <span class="user-name">王安全</span>
          <span class="user-arrow">⌄</span>
        </div>
        <div class="user-dropdown">
          <div class="user-dropdown-head">
            <div class="user-avatar big">王</div>
            <div>
              <div class="user-dropdown-name">王安全</div>
              <div class="user-dropdown-role">安全领导</div>
            </div>
          </div>
          <div class="user-dropdown-item" onclick="openVersionHistory(event)">
            <span>🕘</span>
            <span>历史版本记录</span>
          </div>
        </div>
      </div>

      <span class="role-tag">安全领导</span>
    </div>
  </div>

  <div class="layout">
    <aside class="sider" id="sideMenu"></aside>
    <main class="main">
      <div id="listPage"></div>
      <div id="detailPage" style="display:none"></div>
    </main>
  </div>
</div>

<div class="modal-mask" id="modalMask">
  <div class="modal" id="modalBox">
    <div class="modal-hd">
     <span id="modalTitle">弹窗</span>
      <div class="modal-hd-actions">
      <button class="modal-icon-btn" id="modalFullscreenBtn" title="全屏" onclick="toggleModalFullscreen(event)">⛶</button>
    <span class="close" onclick="closeModal()">×</span>
  </div>
</div>

    <div class="modal-bd" id="modalBody"></div>
    <div class="modal-ft" id="modalFooter">
      <button class="btn" onclick="closeModal()">关闭</button>
      <button class="btn primary" onclick="closeModal()">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<template data-production-dashboard-template="empty">
  <div class="safety-screen-page safety-screen-empty-page">
    <div data-production-slot="header"></div>
    <div class="safety-screen-empty">
      <h2 data-production-empty-title></h2>
      <p>当前看板待配置</p>
    </div>
  </div>
</template>

<template data-production-dashboard-template="major">
  <div class="safety-screen-page production-major-dashboard">
    <div data-production-slot="header"></div>
    <div class="production-major-body">
      <section class="production-value-top-strip production-major-top-strip" data-production-slot="top"></section>
      <section class="production-major-grid" data-production-slot="grid"></section>
    </div>
  </div>
</template>

<template data-production-dashboard-template="overview">
  <div class="safety-screen-page production-overview-dashboard">
    <div data-production-slot="header"></div>
    <div class="safety-screen-body production-overview-body">
      <section class="production-overview-top-grid" data-production-slot="top-grid"></section>
      <section class="production-overview-grid row-analysis" data-production-slot="row-analysis"></section>
      <section class="production-overview-grid main">
        <div data-production-slot="completion"></div>
        <div class="production-overview-middle-stack" data-production-slot="middle"></div>
        <div class="production-overview-right-stack" data-production-slot="right"></div>
      </section>
    </div>
  </div>
</template>

<template data-production-dashboard-template="value">
  <div class="safety-screen-page production-value-dashboard">
    <div data-production-slot="header"></div>
    <div class="safety-screen-body production-value-body">
      <div class="production-value-org-tabs" data-production-slot="org-tabs"></div>
      <section class="production-value-top-strip" data-production-slot="top"></section>
      <section class="production-value-layout">
        <div class="production-value-left">
          <section class="production-value-panel main-output">
            <div class="production-value-panel-hd"><h2>施工类产值</h2></div>
            <div class="production-value-main-summary" data-production-slot="main-summary"></div>
            <div class="production-value-main-matrix" data-production-slot="main-matrix"></div>
          </section>
        </div>
        <div class="production-value-right" data-production-slot="right"></div>
      </section>
      <section class="production-value-bottom-grid" data-production-slot="bottom"></section>
    </div>
  </div>
</template>

<template data-production-dashboard-template="placeholder">
  <div class="compact-title-row">
    <div class="module-title" data-placeholder-title></div>
  </div>
  <section class="card table-card">
    <div class="card-bd" style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted)">
      <div>
        <div style="font-size:56px;margin-bottom:16px" data-placeholder-icon></div>
        <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px" data-placeholder-name></div>
        <div data-placeholder-desc></div>
      </div>
    </div>
  </section>
</template>

<template data-production-dashboard-template="component-demo">
  <div class="compact-title-row">
    <div class="module-title">标准化组件</div>
    <div class="breadcrumb">首页 / 组件 / 标准化组件 / 选择器组件</div>
  </div>
  <section class="card component-demo-card">
    <div class="card-hd"><div class="card-title">BaseSelect</div></div>
    <div class="component-demo-grid">
      <div class="component-demo-item">
        <div class="component-demo-label">基础单选 / 搜索过滤 / 键盘操作</div>
        <div data-production-slot="demo-select"></div>
      </div>
      <div class="component-demo-item">
        <div class="component-demo-label">禁用状态</div>
        <div data-production-slot="demo-disabled-select"></div>
      </div>
    </div>
  </section>
  <section class="card component-demo-card">
    <div class="card-hd"><div class="card-title">BaseMultiSelect</div></div>
    <div class="component-demo-grid">
      <div class="component-demo-item">
        <div class="component-demo-label">多选 / tag + checkbox / 全选 / 清空</div>
        <div data-production-slot="demo-multi-select"></div>
      </div>
      <div class="component-demo-item component-demo-result">
        <div class="component-demo-label">当前值</div>
        <pre data-production-demo-result></pre>
      </div>
    </div>
  </section>
</template>

<template data-production-dashboard-template="construction-project">
  <div class="compact-title-row">
    <div>
      <div class="breadcrumb">生产 / 施工项目一览</div>
      <div class="module-title">施工项目一览表</div>
    </div>
  </div>

  <section id="constructionProjectQueryCard" class="card unified-query-card construction-project-search-card collapsed">
    <div class="card-hd">
      <div class="card-title">查询条件</div>
      <div class="actions">
        <button class="btn" type="button" data-construction-project-reset>重置</button>
        <button class="btn primary" type="button" data-construction-project-query>查询</button>
        <button id="constructionProjectQueryCardToggle" class="btn" type="button" data-construction-project-query-toggle>展开</button>
      </div>
    </div>
    <div class="card-bd">
      <div id="constructionProjectSearchGrid" class="construction-project-search-grid" data-construction-project-search-grid></div>
    </div>
  </section>

  <section class="card construction-project-stat-card">
    <div class="card-bd" id="constructionProjectStats"></div>
  </section>

  <section class="card table-card construction-project-table-card">
    <div class="card-hd">
      <div class="card-title">项目列表</div>
      <div class="actions">
        <button class="btn primary" type="button" data-construction-project-add>新增项目</button>
        <button class="btn" type="button" data-construction-project-refresh>刷新</button>
        <button class="btn primary" type="button" data-construction-project-export>导出</button>
        <button class="column-setting-icon-btn" type="button" title="列设置" data-construction-project-column-setting>⚙</button>
      </div>
    </div>
    <div class="table-wrap roster-table-wrap">
      <table id="constructionProjectTable">
        <thead><tr id="constructionProjectThead"></tr></thead>
        <tbody id="constructionProjectTbody"></tbody>
      </table>
    </div>
    <div class="pagination">
      <span id="constructionProjectTotalText">共 0 条</span>
      <div class="pager">
        <button class="btn mini" type="button" data-construction-project-prev>上一页</button>
        <b id="constructionProjectPageText">第 1 / 1 页</b>
        <button class="btn mini" type="button" data-construction-project-next>下一页</button>
        <select id="constructionProjectPageSize" class="select mini-select" data-construction-project-page-size>
          <option value="10">10条/页</option>
          <option value="20">20条/页</option>
          <option value="50">50条/页</option>
        </select>
      </div>
    </div>
  </section>
</template>

<script src="./organization-data.js?v=2.2.274-output-completion-rate"></script>
<script src="./master-data.js?v=2.2.274-output-completion-rate"></script>
<script>
window.__APP_INITIAL_ROUTE__ = {
  "mode": "enterprise",
  "line": "production",
  "menu": "大屏看板"
};
</script>
<script src="./app.js?v=2.2.274-output-completion-rate"></script>
<script>
  (function(){
    function openMobileOverviewPreview(){
      var query=new URLSearchParams(location.search || "");
      if(query.get("mobileOverview")!=="1" && location.hash!=="#mobile-overview")return;
      if(typeof window.renderMobileProjectOverviewPageV2227==="function"){
        setTimeout(function(){ window.renderMobileProjectOverviewPageV2227(); },0);
      }
    }
    if(document.readyState==="loading"){
      document.addEventListener("DOMContentLoaded",openMobileOverviewPreview);
    }else{
      openMobileOverviewPreview();
    }
  })();
</script>
</body>
</html>
