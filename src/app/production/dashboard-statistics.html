<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生产-纳统看板</title>
<base href="../../../">
<link rel="stylesheet" href="./styles.css?v=2.2.274-output-completion-rate">
<link rel="stylesheet" href="./src/components/base-select/base-select.css">
</head>
<body>
<script src="./src/app/shell/app-shell.js?v=2.2.274-output-completion-rate"></script>

<template data-production-dashboard-template="statistics">
  <div class="safety-screen-page production-overview-dashboard production-statistics-dashboard">
    <div data-production-slot="header"></div>
    <div class="safety-screen-body production-overview-body production-statistics-body">
      <section class="production-statistics-kpi-grid" data-production-slot="statistics-kpis"></section>
      <section class="production-statistics-industry-grid" data-production-slot="statistics-industries"></section>
      <section class="production-statistics-layout">
        <section class="production-overview-card production-statistics-company-panel">
          <div data-production-slot="statistics-company-header"></div>
          <div data-production-slot="statistics-companies"></div>
        </section>
        <section class="production-overview-card production-statistics-detail-panel">
          <div data-production-slot="statistics-detail-header"></div>
          <div class="production-statistics-table-wrap" data-production-slot="statistics-details"></div>
        </section>
      </section>
    </div>
  </div>
</template>

<script src="./organization-data.js?v=2.2.274-output-completion-rate"></script>
<script src="./master-data.js?v=2.2.274-output-completion-rate"></script>
<script src="./src/app/production/dashboard-statistics.js?v=2.2.274-output-completion-rate"></script>
<script src="./app.js?v=2.2.274-output-completion-rate"></script>
<script src="./src/app/shell/mobile-overview-preview.js?v=2.2.274-output-completion-rate"></script>
