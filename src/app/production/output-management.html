<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生产-产值管理</title>
<base href="../../../">
<link rel="stylesheet" href="./styles.css?v=2.2.325-safety-eval-module-copies">

</head>
<body>
<script src="./src/app/shell/app-shell.js?v=2.2.325-safety-eval-module-copies"></script>

<template data-output-management-template="forecast">
  <div class="output-forecast-page">
    <div data-output-slot="title"></div>
    <div data-output-slot="body"></div>
  </div>
</template>

<template data-output-management-template="actual">
  <div class="compact-title-row"><div class="module-title">项目产值上报（废）</div></div>
  <div data-output-slot="query"></div>
  <div data-output-slot="stats"></div>
  <div data-output-slot="table"></div>
</template>

<template data-output-management-template="actual-comprehensive">
  <div class="other-biz-output-page">
    <div class="compact-title-row"><div class="module-title">实际产值上报</div></div>
    <div data-output-slot="query"></div>
    <div data-output-slot="stats"></div>
    <div data-output-slot="table"></div>
  </div>
</template>

<template data-output-management-template="other-biz">
  <div class="other-biz-output-page">
    <div class="compact-title-row"><div class="module-title">其他业态产值申报</div></div>
    <div data-output-slot="query"></div>
    <div data-output-slot="stats"></div>
    <div data-output-slot="table"></div>
  </div>
</template>

<template data-output-management-template="finished-unsettled">
  <div class="other-biz-output-page">
    <div class="compact-title-row"><div class="module-title">完工未结算管理</div></div>
    <div data-output-slot="query"></div>
    <div data-output-slot="table"></div>
  </div>
</template>

<script src="./organization-data.js?v=2.2.325-safety-eval-module-copies"></script>
<script src="./master-data.js?v=2.2.325-safety-eval-module-copies"></script>

window.__APP_INITIAL_ROUTE__ = {
  "mode": "enterprise",

  "group": "产值管理",
  "child": "产值预测分析报表"

</script>
<script src="./app.js?v=2.2.325-safety-eval-module-copies"></script>
