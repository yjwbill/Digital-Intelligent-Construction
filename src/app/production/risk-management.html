<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生产-风险管理</title>
<base href="../../../">
<link rel="stylesheet" href="./styles.css?v=2.2.274-output-completion-rate">
<link rel="stylesheet" href="./src/components/base-select/base-select.css">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="top-left">
      <div class="portal-switch" onclick="togglePcPortalDropdown(event)">
        <button class="portal-switch-trigger" type="button" aria-label="切换端口">
          <span class="portal-switch-grid">▪▪<br/>▪▪</span>
        </button>
        <div class="portal-brand">
          <div class="logo-icon" id="portalLogoIcon">企</div>
          <strong id="portalTitle">企业管理</strong>
        </div>
        <div class="portal-switch-pop" id="portalSwitchPop">
          <div class="portal-pop-brand">
            <span class="portal-pop-mark"></span>
            <strong>数智施工</strong>
          </div>
          <div class="portal-pop-divider"></div>
          <div class="portal-pop-grid">
            <button type="button" data-portal="enterprise" onclick="switchPcPortal(event,'enterprise')">
              <span class="portal-option-icon enterprise">企</span>
              <span>企业管理</span>
            </button>
            <button type="button" data-portal="project" onclick="switchPcPortal(event,'project')">
              <span class="portal-option-icon project">项</span>
              <span>项目管理</span>
            </button>
          </div>
        </div>
      </div>
      <nav class="primary-nav" id="primaryNav"></nav>
    </div>
    <div class="top-user">
      <div class="org-switch" onclick="toggleOrgDropdown(event)">
        <div class="org-current">
          <span class="org-label">组织</span>
          <span id="currentOrgName">隧道股份</span>
          <span class="org-arrow">⌄</span>
        </div>
        <div class="org-dropdown">
          <div class="org-dropdown-title">切换组织</div>
          <div class="org-option active" onclick="selectOrg(event,'隧道股份')">
            <div>
              <div class="org-name">隧道股份</div>
              <div class="org-desc">股份级 · 查看全部组织数据</div>
            </div>
            <span class="org-check">✓</span>
          </div>
          <div class="org-option" onclick="selectOrg(event,'上海隧道')">
            <div>
              <div class="org-name">上海隧道</div>
              <div class="org-desc">子公司 · 隧道股份下属组织</div>
            </div>
            <span class="org-check">✓</span>
          </div>
          <div class="org-option" onclick="selectOrg(event,'市政集团')">
            <div>
              <div class="org-name">市政集团</div>
              <div class="org-desc">子公司 · 隧道股份下属组织</div>
            </div>
            <span class="org-check">✓</span>
          </div>
        </div>
      </div>

      <div class="user-menu" onclick="toggleUserDropdown(event)">
        <div class="user-profile">
          <div class="user-avatar">王</div>
          <span class="user-name">王安全</span>
          <span class="user-arrow">⌄</span>
        </div>
        <div class="user-dropdown">
          <div class="user-dropdown-head">
            <div class="user-avatar big">王</div>
            <div>
              <div class="user-dropdown-name">王安全</div>
              <div class="user-dropdown-role">安全领导</div>
            </div>
          </div>
          <div class="user-dropdown-item" onclick="openVersionHistory(event)">
            <span>🕘</span>
            <span>历史版本记录</span>
          </div>
        </div>
      </div>

      <span class="role-tag">安全领导</span>
    </div>
  </div>

  <div class="layout">
    <aside class="sider" id="sideMenu"></aside>
    <main class="main">
      <div id="listPage"></div>
      <div id="detailPage" style="display:none"></div>
    </main>
  </div>
</div>

<div class="modal-mask" id="modalMask">
  <div class="modal" id="modalBox">
    <div class="modal-hd">
     <span id="modalTitle">弹窗</span>
      <div class="modal-hd-actions">
      <button class="modal-icon-btn" id="modalFullscreenBtn" title="全屏" onclick="toggleModalFullscreen(event)">⛶</button>
    <span class="close" onclick="closeModal()">×</span>
  </div>
</div>

    <div class="modal-bd" id="modalBody"></div>
    <div class="modal-ft" id="modalFooter">
      <button class="btn" onclick="closeModal()">关闭</button>
      <button class="btn primary" onclick="closeModal()">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<template data-risk-management-template="ledger">
  <div class="compact-title-row">
    <div class="module-title">风险管控清单</div>
    <div class="breadcrumb">首页 / 生产管理 / 风险管理 / 风险管控清单</div>
  </div>

  <section id="riskQueryCard" class="card unified-query-card risk-search-card collapsed">
    <div class="card-hd">
      <div class="card-title">查询条件</div>
      <div class="actions">
        <button class="btn" type="button" data-risk-reset>重置</button>
        <button class="btn primary" type="button" data-risk-query>查询</button>
        <button id="riskQueryCardToggle" class="btn" type="button" data-risk-query-toggle>展开</button>
      </div>
    </div>
    <div class="card-bd">
      <div class="risk-search-grid risk-search-grid-fixed">
        <div class="form-item"><label>风险名称</label><input id="riskNameFilter" class="input" placeholder="模糊搜索风险名称"/></div>
        <div class="form-item"><label>风险描述</label><input id="riskDescFilter" class="input" placeholder="模糊搜索风险描述"/></div>
        <div class="form-item"><label>风险等级</label><div data-risk-slot="level"></div></div>
        <div class="form-item"><label>风险类型</label><div data-risk-slot="type"></div></div>

        <div class="form-item"><label>项目名称</label><input id="riskProjectNameFilter" class="input" placeholder="模糊搜索项目名称"/></div>
        <div class="form-item"><label>子公司</label><div data-risk-slot="sub-company"></div></div>
        <div class="form-item"><label>分公司</label><div data-risk-slot="branch-company"></div></div>
        <div class="form-item"><label>项目经理</label><input id="riskProjectManagerFilter" class="input" placeholder="模糊搜索项目经理"/></div>

        <div class="form-item"><label>计划开始日期</label><div data-risk-slot="plan-start"></div></div>
        <div class="form-item"><label>实际开始日期</label><div data-risk-slot="actual-start"></div></div>
        <div class="form-item"><label>计划完成日期</label><div data-risk-slot="plan-end"></div></div>
        <div class="form-item"><label>实际结束日期</label><div data-risk-slot="actual-end"></div></div>

        <div class="form-item"><label>挂牌领导</label><input id="riskSupervisorFilter" class="input" placeholder="模糊搜索挂牌领导"/></div>
        <div class="form-item"><label>开工令</label><select id="riskStartOrderFilter" class="select"><option value="">全部</option><option>已上传</option><option>未上传</option></select></div>
        <div class="form-item"><label>是否年度风险</label><select id="riskMajorFilter" class="select"><option value="">全部</option><option>是</option><option>否</option></select></div>
        <div class="form-item"><label>是否临铁/临高速</label><select id="riskRailHighwayFilter" class="select"><option value="">全部</option><option>是</option><option>否</option></select></div>

        <div class="form-item"><label>条件验收</label><select id="riskConditionFilter" class="select"><option value="">全部</option><option>是</option><option>否</option></select></div>
        <div class="form-item"><label>风险状态</label><select id="riskStatusFilter" class="select"><option value="">全部</option><option>已完成</option><option>未完成</option></select></div>
        <div class="form-item"><label>所属区域</label><div data-risk-slot="area"></div></div>
        <div class="form-item"><label>省市区</label><div class="risk-cascader" data-risk-slot="province"></div></div>
      </div>
    </div>
  </section>

  <section class="card unified-stats-card risk-stat-card">
    <div class="card-bd"><div class="risk-stats stats" id="riskStatsBox"></div></div>
  </section>

  <section class="card table-card risk-table-card">
    <div class="card-hd">
      <div class="card-title">风险管控清单</div>
      <div class="actions">
        <button class="btn primary" type="button" data-risk-export>数据导出</button>
        <button class="btn" type="button" data-risk-refresh>刷新</button>
        <button class="column-setting-icon-btn" type="button" title="列配置" data-risk-column-setting>⚙</button>
      </div>
    </div>
    <div class="table-wrap roster-table-wrap">
      <table id="riskTable">
        <thead><tr id="riskThead"></tr></thead>
        <tbody id="riskTbody"></tbody>
      </table>
    </div>
    <div class="pagination risk-pagination">
      <span id="riskTotalText">共 0 条记录</span>
      <span class="pager">
        <button class="btn mini" type="button" data-risk-page-prev>‹</button>
        <b id="riskPageText">1</b>
        <button class="btn mini" type="button" data-risk-page-next>›</button>
        <select id="riskPageSize" class="select mini-select" data-risk-page-size>
          <option value="25">25条/页</option>
          <option value="50" selected>50条/页</option>
          <option value="100">100条/页</option>
        </select>
      </span>
    </div>
  </section>
</template>

<script src="./organization-data.js?v=2.2.274-output-completion-rate"></script>
<script src="./master-data.js?v=2.2.274-output-completion-rate"></script>
<script>
window.__APP_INITIAL_ROUTE__ = {
  "mode": "enterprise",
  "line": "production",
  "group": "风险管理",
  "child": "风险管控清单"
};
</script>
<script src="./app.js?v=2.2.274-output-completion-rate"></script>
<script>
  (function(){
    function openMobileOverviewPreview(){
      var query=new URLSearchParams(location.search || "");
      if(query.get("mobileOverview")!=="1" && location.hash!=="#mobile-overview")return;
      if(typeof window.renderMobileProjectOverviewPageV2227==="function"){
        setTimeout(function(){ window.renderMobileProjectOverviewPageV2227(); },0);
      }
    }
    if(document.readyState==="loading"){
      document.addEventListener("DOMContentLoaded",openMobileOverviewPreview);
    }else{
      openMobileOverviewPreview();
    }
  })();
</script>
</body>
</html>
